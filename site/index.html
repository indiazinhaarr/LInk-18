<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f9c7d5">
  <title>Indiazinha | Redes</title>
  <style>
    :root{--bg:#c8a6ac;--card:#ffe2e8;--soft:#fff7fa;--ink:#9c1458;--strong:#711344;--pink:#f40f79;--blue:#4e8cff;--gold:#e8a01d;--green:#2ca977}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:28px 16px;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent 45%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.card{width:min(100%,435px);min-height:min(850px,calc(100vh - 56px));display:flex;flex-direction:column;padding:22px;border-radius:18px;background:linear-gradient(180deg,var(--card),#ffd2dc 32%,var(--soft) 76%,#fff);box-shadow:0 28px 90px rgba(88,34,54,.28);overflow:hidden}.top{display:flex;justify-content:space-between}.icon{width:34px;height:34px;border:0;border-radius:999px;background:rgba(255,255,255,.82);box-shadow:0 10px 22px rgba(113,19,68,.12);cursor:pointer}.profile{display:grid;justify-items:center;padding-top:22px;text-align:center}.avatar{width:78px;height:78px;display:grid;place-items:center;border:3px solid rgba(255,255,255,.92);border-radius:999px;background:linear-gradient(135deg,#d51b72,#ffd0de 48%,#7a3cff);color:#fff;font-size:2rem;box-shadow:0 14px 34px rgba(113,19,68,.2)}h1{margin:12px 0 0;color:var(--strong);font-family:Georgia,serif;font-size:1.45rem}.bio{width:min(100%,310px);min-height:42px;margin:5px 0 0;font-family:Georgia,serif;font-size:.86rem;font-weight:700;line-height:1.35}.socials{display:flex;gap:16px;margin-top:13px;color:var(--pink);font-size:1.45rem;font-weight:900}.media{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:28px}.tile{aspect-ratio:1;display:grid;place-items:center;border:1px solid rgba(213,27,114,.24);border-radius:16px;background:rgba(255,255,255,.48);color:var(--pink);font-size:1.9rem;box-shadow:0 12px 26px rgba(113,19,68,.08)}.photo{background:linear-gradient(135deg,#f40f79,#ffd6e1 55%,#4e8cff);color:#fff}.gif{animation:float 1.8s ease-in-out infinite}.links{display:grid;gap:11px;margin-top:18px}.link{--tone:var(--pink);--box:#ffe2ef;--muted:#9d3d69;min-height:52px;display:grid;grid-template-columns:43px minmax(0,1fr) 22px;align-items:center;gap:10px;padding:5px 12px 5px 5px;border:1.5px solid var(--tone);border-radius:999px;background:rgba(255,247,250,.58);color:var(--tone);text-align:center;text-decoration:none;font:inherit}.blue{--tone:var(--blue);--box:#e2ecff;--muted:#3669c9}.gold{--tone:var(--gold);--box:#fff0c9;--muted:#a97112}.green{--tone:var(--green);--box:#dff5ec;--muted:#247b5c}.thumb{width:41px;height:41px;display:grid;place-items:center;border-radius:999px;background:var(--box);font-size:1.25rem}.title,.sub{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.title{font-family:Georgia,serif;font-size:.91rem;font-weight:800}.sub{margin-top:2px;color:var(--muted);font-size:.66rem}.disabled{opacity:.86}footer{margin-top:auto;padding-top:28px;color:rgba(113,19,68,.58);text-align:center;font-size:.72rem}.toast{position:fixed;left:50%;bottom:22px;max-width:min(340px,calc(100vw - 32px));padding:10px 15px;border-radius:999px;background:#151014;color:#fff;font-size:.82rem;font-weight:800;opacity:0;pointer-events:none;transform:translate(-50%,10px);transition:.16s}.toast.show{opacity:1;transform:translate(-50%,0)}@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.03)}}@media(max-width:520px){body{padding:0}.card{width:100%;min-height:100vh;border-radius:0;box-shadow:none}}
  </style>
</head>
<body>
  <main class="card">
    <div class="top"><button class="icon" id="theme" aria-label="Mudar cores">✦</button><button class="icon" id="share" aria-label="Compartilhar">↗</button></div>
    <header class="profile"><div class="avatar">💗</div><h1>Indiazinha</h1><p class="bio">🔞 Conteúdo exclusivo, Discord oficial e links para explorar 👇</p><div class="socials"><span>◎</span><span>♪</span><span>➤</span></div></header>
    <section class="media"><div class="tile photo">📷</div><div class="tile">💗</div><div class="tile gif">✨</div></section>
    <nav class="links"><a class="link blue" href="https://discord.gg/gsYENYhGzA" target="_blank" rel="noopener noreferrer"><span class="thumb">☁</span><span><span class="title">Servidor do Discord 🔗</span><span class="sub">Entrada gratuita</span></span><span>›</span></a><div class="link disabled"><span class="thumb">💗</span><span><span class="title">Acesso exclusivo 💗</span><span class="sub">Espaço reservado para novidades</span></span><span>⋯</span></div><button class="link gold" id="share-link"><span class="thumb">✨</span><span><span class="title">Redes oficiais ✨</span><span class="sub">Compartilhe esse perfil</span></span><span>›</span></button><div class="link green disabled"><span class="thumb">🌸</span><span><span class="title">Fotos e avisos 🌸</span><span class="sub">Em breve</span></span><span>⋯</span></div></nav>
    <footer>Acesso somente para maiores de 18 anos.</footer>
  </main>
  <p class="toast" id="toast"></p>
  <script>
    const SHARE_URL='https://indiazinharedes.netlify.app/';const toast=document.getElementById('toast');async function shareProfile(){if(navigator.share){try{await navigator.share({title:'Indiazinha',text:'Links oficiais da Indiazinha',url:SHARE_URL});return}catch(e){if(e&&e.name==='AbortError')return}}try{await navigator.clipboard.writeText(SHARE_URL);showToast('Link copiado')}catch{showToast(SHARE_URL)}}function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove('show'),2200)}document.getElementById('share').onclick=shareProfile;document.getElementById('share-link').onclick=shareProfile;
  </script>
</body>
</html>
