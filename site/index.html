<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f9c7d5">
  <title>Indiazinha | Redes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{color-scheme:light;--page:#c8a6ac;--card:#ffe1e8;--soft:#fff7fa;--ink:#9c1458;--strong:#6f123e;--line:#f40f79;--pink:#f40f79;--blue:#5865f2;--shadow:0 30px 90px rgba(88,34,54,.28)}*{box-sizing:border-box}html{min-height:100%;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent 44%),var(--page)}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:28px 16px;color:var(--ink);font-family:Nunito,"Arial Rounded MT Bold",system-ui,sans-serif;line-height:1.4}button,a{font:inherit}button{border:0}.card{position:relative;width:min(100%,435px);min-height:min(760px,calc(100vh - 56px));display:flex;flex-direction:column;overflow:hidden;padding:22px;border-radius:18px;background:linear-gradient(180deg,var(--card),#ffd3dd 38%,var(--soft) 82%,#fff);box-shadow:var(--shadow)}.card:before{position:absolute;inset:auto -25% -22% 18%;height:300px;background:radial-gradient(circle,rgba(244,15,121,.12),transparent 66%);content:"";pointer-events:none}.top{position:relative;z-index:4;display:flex;justify-content:space-between}.icon{width:36px;height:36px;display:grid;place-items:center;border-radius:999px;background:rgba(255,255,255,.82);color:#211019;box-shadow:0 10px 22px rgba(113,19,68,.12);cursor:pointer}.icon svg{width:17px;height:17px;fill:currentColor}.share-menu{position:absolute;top:66px;right:20px;z-index:5;width:min(220px,calc(100% - 40px));display:grid;gap:7px;padding:10px;border:1px solid rgba(244,15,121,.16);border-radius:16px;background:rgba(255,250,252,.96);box-shadow:0 20px 44px rgba(88,34,54,.18);backdrop-filter:blur(14px)}.share-menu[hidden]{display:none}.share-option{min-height:38px;display:grid;grid-template-columns:22px minmax(0,1fr);align-items:center;gap:9px;padding:8px 10px;border-radius:12px;background:transparent;color:var(--strong);text-align:left;text-decoration:none;cursor:pointer}.share-option:hover{background:rgba(244,15,121,.08)}.share-option svg,.social svg,.thumb svg,.arrow svg{fill:currentColor}.profile{position:relative;z-index:1;display:grid;justify-items:center;padding-top:24px;text-align:center}.avatar{width:82px;height:82px;display:grid;place-items:center;border:3px solid rgba(255,255,255,.92);border-radius:999px;background:linear-gradient(135deg,#f40f79,#ffd6e1 55%,#5865f2);color:#fff;font-size:2.1rem;box-shadow:0 16px 38px rgba(113,19,68,.2)}h1{margin:13px 0 0;color:var(--strong);font-size:1.72rem;font-weight:900;line-height:1.08;letter-spacing:0}.bio{width:min(100%,318px);min-height:42px;margin:6px 0 0;color:var(--ink);font-size:.93rem;font-weight:800;line-height:1.36}.socials{display:flex;justify-content:center;gap:16px;margin-top:16px}.social{width:34px;height:34px;display:grid;place-items:center;border-radius:999px;color:var(--line);background:rgba(255,255,255,.28);text-decoration:none}.social svg{width:24px;height:24px}.links{position:relative;z-index:1;display:grid;gap:13px;margin-top:34px}.link{--tone:var(--pink);--box:#ffe2ef;--muted:#b52c6b;min-height:58px;display:grid;grid-template-columns:46px minmax(0,1fr) 22px;align-items:center;gap:11px;padding:6px 13px 6px 6px;border:1.5px solid var(--tone);border-radius:999px;background:rgba(255,247,250,.64);color:var(--tone);text-align:center;text-decoration:none}.link.blue{--tone:var(--blue);--box:#e4e8ff;--muted:#4650c8}.link:disabled{cursor:default;opacity:.82}.thumb{width:44px;height:44px;display:grid;place-items:center;border-radius:999px;background:var(--box);color:var(--tone)}.thumb svg{width:23px;height:23px}.title,.sub{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.title{font-size:.98rem;font-weight:900;line-height:1.12}.sub{margin-top:3px;color:var(--muted);font-size:.72rem;font-weight:700}.arrow{justify-self:end;line-height:1}.arrow svg{width:17px;height:17px;display:block}footer{position:relative;z-index:1;margin-top:auto;padding-top:28px;color:rgba(113,19,68,.58);text-align:center;font-size:.72rem;font-weight:700}.toast{position:fixed;left:50%;bottom:22px;z-index:10;max-width:min(340px,calc(100vw - 32px));margin:0;padding:10px 15px;border-radius:999px;background:#151014;color:#fff;font-size:.82rem;font-weight:800;opacity:0;pointer-events:none;transform:translate(-50%,10px);transition:.16s}.toast.show{opacity:1;transform:translate(-50%,0)}body.dark{color-scheme:dark;--page:#151016;--card:#20161f;--soft:#120f14;--ink:#ffd4e5;--strong:#fff;--line:#ff5fa9;--pink:#ff5fa9;--blue:#8f98ff;--shadow:0 30px 90px rgba(0,0,0,.48)}body.dark .card{background:linear-gradient(180deg,var(--card),#241522 42%,var(--soft))}body.dark .icon,body.dark .share-menu{background:rgba(27,22,28,.92);color:#fff}body.dark .link{background:rgba(255,255,255,.05)}@media(max-width:520px){body{padding:0}.card{width:100%;min-height:100vh;border-radius:0;box-shadow:none}}
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <button class="icon" id="theme" aria-label="Mudar tema">☾</button>
      <button class="icon" id="share" aria-label="Compartilhar" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.1c-1 0-1.9.4-2.5 1.1L8.8 13a3.2 3.2 0 0 0 0-2l6.6-4.1A3.2 3.2 0 1 0 14.4 5L7.8 9.1a3.2 3.2 0 1 0 0 5.8l6.6 4.2A3.2 3.2 0 1 0 18 16.1Z"/></svg></button>
    </div>
    <div id="share-menu" class="share-menu" hidden></div>
    <header class="profile">
      <div class="avatar">💗</div>
      <h1>Indiazinha</h1>
      <p class="bio">🔞 Conteúdo exclusivo, Discord oficial e links para explorar 👇</p>
      <nav id="socials" class="socials" aria-label="Redes sociais"></nav>
    </header>
    <nav id="links" class="links" aria-label="Links principais"></nav>
    <footer>Acesso somente para maiores de 18 anos.</footer>
  </main>
  <p id="toast" class="toast" role="status" aria-live="polite"></p>
  <script>
    const DISCORD_URL='https://discord.gg/gsYENYhGzA';const SHARE_URL='https://indiazinharedes.netlify.app/';const FUTURE_SITE_URL='';const themeMeta=document.querySelector('meta[name="theme-color"]');const icons={telegram:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.8 4.7 18.5 20c-.2 1-.8 1.2-1.7.8l-5-3.7-2.4 2.3c-.3.3-.5.5-1 .5l.3-5.2 9.4-8.5c.4-.4-.1-.6-.6-.2L5.9 13.3.9 11.8c-1.1-.3-1.1-1.1.2-1.6L20.4 2.8c.9-.3 1.7.2 1.4 1.9Z"/></svg>',whatsapp:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 3.5A11.8 11.8 0 0 0 2.9 18l-1 4 4.1-1a11.8 11.8 0 0 0 14.5-17.5ZM12 20a8 8 0 0 1-4.1-1.1l-.3-.2-2.4.6.6-2.3-.2-.4A8 8 0 1 1 12 20Zm4.5-5.9c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.6.1-.2.3-.6.8-.8 1-.1.2-.3.2-.5.1a6.6 6.6 0 0 1-3.3-2.9c-.1-.2 0-.4.1-.5l.4-.5c.1-.1.2-.3.3-.4.1-.2 0-.3 0-.5l-.7-1.6c-.2-.4-.4-.3-.6-.3h-.5c-.2 0-.5.1-.7.3-.2.3-.9.9-.9 2.1 0 1.2.9 2.4 1 2.5.1.2 1.8 2.8 4.4 3.9 1.6.7 2.2.8 3 .7.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1-.1-.2-.3-.3-.5-.4Z"/></svg>',discord:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.7 5.2A16.4 16.4 0 0 0 15.6 4l-.2.4-.5 1a15.2 15.2 0 0 0-4.6 0 8 8 0 0 0-.7-1.4 16.3 16.3 0 0 0-4.1 1.2C2.9 9.1 2.2 13 2.5 16.9a16.7 16.7 0 0 0 5 2.5l1.1-1.8a10 10 0 0 1-1.8-.8l.4-.3a11.7 11.7 0 0 0 9.9 0l.4.3a10 10 0 0 1-1.8.8l1.1 1.8a16.6 16.6 0 0 0 5-2.5c.4-4.5-.7-8.3-2.1-11.7ZM9.1 14.5c-1 0-1.8-.9-1.8-2s.8-2 1.8-2c1 0 1.9.9 1.8 2 0 1.1-.8 2-1.8 2Zm5.8 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2c1 0 1.8.9 1.8 2s-.8 2-1.8 2Z"/></svg>',spark:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2 1.9 6.1L20 10l-6.1 1.9L12 18l-1.9-6.1L4 10l6.1-1.9L12 2Zm6 11 1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3Z"/></svg>',arrow:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.2 5.3a1 1 0 0 1 1.4 0l5.4 5.4a1 1 0 0 1 0 1.4l-5.4 5.4a1 1 0 1 1-1.4-1.4l3.7-3.7H5a1 1 0 1 1 0-2h11.9l-3.7-3.7a1 1 0 0 1 0-1.4Z"/></svg>',link:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.6 13.4a1 1 0 0 1 0-1.4l4.2-4.2a3 3 0 1 1 4.2 4.2l-2 2a1 1 0 1 0 1.4 1.4l2-2a5 5 0 1 0-7.1-7.1l-4.1 4.2a1 1 0 0 0 1.4 1.4Zm2.8-2.8a1 1 0 0 1 0 1.4l-4.2 4.2A3 3 0 0 1 5 12l2-2a1 1 0 1 0-1.4-1.4l-2 2a5 5 0 0 0 7.1 7.1l4.1-4.2a1 1 0 0 0-1.4-1.4Z"/></svg>'};const shareTargets={telegram:`https://t.me/share/url?url=${encodeURIComponent(SHARE_URL)}&text=${encodeURIComponent('Indiazinha')}`,whatsapp:`https://wa.me/?text=${encodeURIComponent(`Indiazinha: ${SHARE_URL}`)}`,discord:DISCORD_URL};const socials=[['Telegram','telegram',shareTargets.telegram],['WhatsApp','whatsapp',shareTargets.whatsapp],['Discord','discord',DISCORD_URL]];const links=[['Servidor do Discord','Entrar na comunidade oficial','discord','blue',DISCORD_URL,false],['Futuro site','Em breve','spark','',FUTURE_SITE_URL,true]];function render(){document.getElementById('socials').innerHTML=socials.map(([label,icon,url])=>`<a class="social" href="${url}" target="_blank" rel="noopener noreferrer" aria-label="${label}" title="${label}">${icons[icon]}</a>`).join('');document.getElementById('links').innerHTML=links.map(([title,sub,icon,tone,url,disabled])=>disabled?`<button class="link" disabled><span class="thumb">${icons[icon]}</span><span><span class="title">${title}</span><span class="sub">${sub}</span></span><span class="arrow">⋯</span></button>`:`<a class="link ${tone}" href="${url}" target="_blank" rel="noopener noreferrer"><span class="thumb">${icons[icon]}</span><span><span class="title">${title}</span><span class="sub">${sub}</span></span><span class="arrow">${icons.arrow}</span></a>`).join('');document.getElementById('share-menu').innerHTML=[['Telegram','telegram',shareTargets.telegram],['WhatsApp','whatsapp',shareTargets.whatsapp],['Discord','discord',DISCORD_URL]].map(([label,icon,url])=>`<a class="share-option" href="${url}" target="_blank" rel="noopener noreferrer">${icons[icon]}<span>${label}</span></a>`).join('')+`<button class="share-option" id="copy">${icons.link}<span>Copiar link</span></button>`;document.getElementById('copy').onclick=copyLink}function toast(text){const el=document.getElementById('toast');el.textContent=text;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),2200)}async function copyLink(){try{await navigator.clipboard.writeText(SHARE_URL);toast('Link copiado')}catch{toast(SHARE_URL)}closeShare()}function toggleShare(){const menu=document.getElementById('share-menu');const open=menu.hidden;menu.hidden=!open;document.getElementById('share').setAttribute('aria-expanded',String(open))}function closeShare(){const menu=document.getElementById('share-menu');menu.hidden=true;document.getElementById('share').setAttribute('aria-expanded','false')}async function share(){if(navigator.share){try{await navigator.share({title:'Indiazinha',text:'Links oficiais da Indiazinha',url:SHARE_URL});return}catch(e){if(e&&e.name==='AbortError')return}}toggleShare()}function syncTheme(){const dark=document.body.classList.contains('dark');document.getElementById('theme').textContent=dark?'☀':'☾';themeMeta.setAttribute('content',dark?'#130f14':'#f9c7d5')}document.getElementById('share').onclick=share;document.getElementById('theme').onclick=()=>{document.body.classList.toggle('dark');localStorage.setItem('indiazinharedes-theme',document.body.classList.contains('dark')?'dark':'pink');syncTheme()};document.addEventListener('click',e=>{if(!e.target.closest('#share')&&!e.target.closest('#share-menu'))closeShare()});if(localStorage.getItem('indiazinharedes-theme')==='dark')document.body.classList.add('dark');render();syncTheme();
  </script>
</body>
</html>
