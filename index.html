<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f9c7d5" />
    <meta name="description" content="Links oficiais da Indiazinha: Discord, redes e novidades." />
    <title>Indiazinha | Redes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: light;
        --page: #c8a6ac;
        --card: #ffe1e8;
        --card-soft: #fff7fa;
        --ink: #9c1458;
        --ink-strong: #6f123e;
        --muted: #b44879;
        --line: #f40f79;
        --pink: #f40f79;
        --blue: #5865f2;
        --shadow: 0 30px 90px rgba(88, 34, 54, 0.28);
      }

      * { box-sizing: border-box; }

      html {
        min-height: 100%;
        background: linear-gradient(180deg, rgba(255,255,255,.22), transparent 44%), var(--page);
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Nunito", "Arial Rounded MT Bold", ui-rounded, system-ui, sans-serif;
        line-height: 1.4;
        text-rendering: geometricPrecision;
      }

      button, a { font: inherit; }
      button { border: 0; }
      button:focus-visible, a:focus-visible { outline: 3px solid rgba(244, 15, 121, .28); outline-offset: 3px; }

      .page-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .profile-card {
        position: relative;
        width: min(100%, 435px);
        min-height: min(760px, calc(100vh - 56px));
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 22px 22px 26px;
        border-radius: 18px;
        background: linear-gradient(180deg, var(--card) 0%, #ffd3dd 38%, var(--card-soft) 82%, #fff 100%);
        box-shadow: var(--shadow);
      }

      .profile-card::before {
        position: absolute;
        inset: auto -25% -22% 18%;
        height: 300px;
        background: radial-gradient(circle, rgba(244, 15, 121, .12), transparent 66%);
        content: "";
        pointer-events: none;
      }

      .top-actions {
        position: relative;
        z-index: 4;
        display: flex;
        justify-content: space-between;
      }

      .icon-button {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255,255,255,.82);
        color: #211019;
        box-shadow: 0 10px 22px rgba(113, 19, 68, .12);
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, color 160ms ease;
      }

      .icon-button:hover { transform: translateY(-2px); background: #fff; }
      .icon-button svg { width: 17px; height: 17px; fill: currentColor; }
      .theme-button { font-size: 1rem; font-weight: 900; }

      .share-menu {
        position: absolute;
        top: 66px;
        right: 20px;
        z-index: 5;
        width: min(220px, calc(100% - 40px));
        display: grid;
        gap: 7px;
        padding: 10px;
        border: 1px solid rgba(244, 15, 121, .16);
        border-radius: 16px;
        background: rgba(255,250,252,.96);
        box-shadow: 0 20px 44px rgba(88, 34, 54, .18);
        backdrop-filter: blur(14px);
      }

      .share-menu[hidden] { display: none; }

      .share-option {
        min-height: 38px;
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr);
        align-items: center;
        gap: 9px;
        padding: 8px 10px;
        border-radius: 12px;
        background: transparent;
        color: var(--ink-strong);
        text-align: left;
        text-decoration: none;
        cursor: pointer;
      }

      .share-option:hover { background: rgba(244, 15, 121, .08); }
      .share-option svg { width: 21px; height: 21px; fill: currentColor; }

      .profile {
        position: relative;
        z-index: 1;
        display: grid;
        justify-items: center;
        padding-top: 24px;
        text-align: center;
      }

      .avatar {
        width: 82px;
        height: 82px;
        display: grid;
        place-items: center;
        border: 3px solid rgba(255,255,255,.92);
        border-radius: 999px;
        background: linear-gradient(135deg, #f40f79, #ffd6e1 55%, #5865f2);
        color: #fff;
        font-size: 2rem;
        font-weight: 900;
        box-shadow: 0 16px 38px rgba(113, 19, 68, .2);
      }

      h1 {
        margin: 13px 0 0;
        color: var(--ink-strong);
        font-size: 1.72rem;
        font-weight: 900;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .bio {
        width: min(100%, 318px);
        min-height: 42px;
        margin: 6px 0 0;
        color: var(--ink);
        font-size: .93rem;
        font-weight: 800;
        line-height: 1.36;
      }

      .social-row {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 16px;
      }

      .social-link {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        color: var(--line);
        background: rgba(255,255,255,.28);
        text-decoration: none;
        transition: transform 160ms ease, background 160ms ease;
      }

      .social-link:hover { transform: translateY(-2px); background: rgba(255,255,255,.68); }
      .social-link svg { width: 24px; height: 24px; fill: currentColor; }

      .links-list {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 13px;
        margin-top: 34px;
      }

      .link-button {
        --tone: var(--pink);
        --tone-soft: #ffe2ef;
        --tone-muted: #9d3d69;
        width: 100%;
        min-height: 58px;
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr) 22px;
        align-items: center;
        gap: 11px;
        padding: 6px 13px 6px 6px;
        border: 1.5px solid var(--tone);
        border-radius: 999px;
        color: var(--tone);
        text-align: center;
        text-decoration: none;
        background: rgba(255,247,250,.64);
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
      }

      .link-button:hover:not(:disabled) {
        transform: translateY(-2px);
        background: rgba(255,255,255,.82);
        box-shadow: 0 14px 28px rgba(113, 19, 68, .12);
      }

      .link-button:disabled { cursor: default; opacity: .82; }
      .tone-blue { --tone: var(--blue); --tone-soft: #e4e8ff; --tone-muted: #4650c8; }
      .tone-pink { --tone: var(--pink); --tone-soft: #ffe2ef; --tone-muted: #b52c6b; }

      .link-thumb {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: var(--tone-soft);
        color: var(--tone);
      }

      .link-thumb svg { width: 23px; height: 23px; fill: currentColor; }
      .link-copy { min-width: 0; }

      .link-title, .link-subtitle {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .link-title { color: currentColor; font-size: .98rem; font-weight: 900; line-height: 1.12; }
      .link-subtitle { margin-top: 3px; color: var(--tone-muted); font-size: .72rem; font-weight: 700; line-height: 1.15; }
      .link-arrow { justify-self: end; line-height: 1; }
      .link-arrow svg { width: 17px; height: 17px; display: block; fill: currentColor; }

      .footer {
        position: relative;
        z-index: 1;
        margin-top: auto;
        padding-top: 28px;
        color: rgba(113, 19, 68, .58);
        text-align: center;
        font-size: .72rem;
        font-weight: 700;
      }

      .footer p { margin: 0; }

      .share-toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        z-index: 10;
        max-width: min(340px, calc(100vw - 32px));
        margin: 0;
        padding: 10px 15px;
        border-radius: 999px;
        background: #151014;
        color: #fff;
        font-size: .82rem;
        font-weight: 800;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, 10px);
        transition: opacity 160ms ease, transform 160ms ease;
      }

      .share-toast.is-visible { opacity: 1; transform: translate(-50%, 0); }

      body.dark {
        color-scheme: dark;
        --page: #151016;
        --card: #20161f;
        --card-soft: #120f14;
        --ink: #ffd4e5;
        --ink-strong: #fff;
        --muted: #ff9cca;
        --line: #ff5fa9;
        --pink: #ff5fa9;
        --blue: #8f98ff;
        --shadow: 0 30px 90px rgba(0,0,0,.48);
      }

      body.dark .profile-card { background: linear-gradient(180deg, var(--card) 0%, #241522 42%, var(--card-soft) 100%); }
      body.dark .icon-button, body.dark .share-menu { background: rgba(27,22,28,.92); color: #fff; }
      body.dark .link-button { background: rgba(255,255,255,.05); }

      @media (max-width: 520px) {
        .page-shell { padding: 0; }
        .profile-card { width: 100%; min-height: 100vh; border-radius: 0; box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <section class="profile-card" aria-label="Links oficiais da Indiazinha">
        <div class="top-actions">
          <button class="icon-button theme-button" type="button" aria-label="Mudar cores" title="Mudar cores">
            <span aria-hidden="true">☾</span>
          </button>
          <button class="icon-button share-button" type="button" aria-label="Compartilhar" title="Compartilhar" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.1c-1 0-1.9.4-2.5 1.1L8.8 13a3.2 3.2 0 0 0 0-2l6.6-4.1A3.2 3.2 0 1 0 14.4 5L7.8 9.1a3.2 3.2 0 1 0 0 5.8l6.6 4.2A3.2 3.2 0 1 0 18 16.1Z" /></svg>
          </button>
        </div>
        <div id="share-menu" class="share-menu" hidden></div>

        <header class="profile">
          <div class="avatar" aria-hidden="true">I</div>
          <h1 id="profile-name">Indiazinha</h1>
          <p id="profile-bio" class="bio"></p>
          <nav id="social-row" class="social-row" aria-label="Redes sociais"></nav>
        </header>

        <nav id="links-list" class="links-list" aria-label="Links principais"></nav>

        <footer class="footer">
          <p>Acesso somente para maiores de 18 anos.</p>
        </footer>
      </section>
    </main>

    <p id="share-toast" class="share-toast" role="status" aria-live="polite"></p>

    <script>
      const DISCORD_URL = 'https://discord.gg/gsYENYhGzA';
      const FUTURE_SITE_URL = '';
      const SHARE_URL = 'https://indiazinharedes.netlify.app/';
      const THEME_STORAGE_KEY = 'indiazinharedes-theme';
      const themeMeta = document.querySelector('meta[name="theme-color"]');

      const profile = {
        name: 'Indiazinha',
        bio: 'Conteudo exclusivo, Discord oficial e links para explorar'
      };

      const shareTargets = {
        telegram: `https://t.me/share/url?url=${encodeURIComponent(SHARE_URL)}&text=${encodeURIComponent('Indiazinha')}`,
        whatsapp: `https://wa.me/?text=${encodeURIComponent(`Indiazinha: ${SHARE_URL}`)}`,
        discord: DISCORD_URL
      };

      const socialLinks = [
        { label: 'Telegram', icon: 'telegram', url: shareTargets.telegram },
        { label: 'WhatsApp', icon: 'whatsapp', url: shareTargets.whatsapp },
        { label: 'Discord', icon: 'discord', url: DISCORD_URL }
      ];

      const mainLinks = [
        { title: 'Servidor do Discord', subtitle: 'Entrar na comunidade oficial', url: DISCORD_URL, thumb: 'discord', tone: 'blue' },
        { title: 'Futuro site', subtitle: 'Em breve', url: FUTURE_SITE_URL, thumb: 'spark', tone: 'pink', disabled: true }
      ];

      const shareOptions = [
        { label: 'Telegram', icon: 'telegram', url: shareTargets.telegram },
        { label: 'WhatsApp', icon: 'whatsapp', url: shareTargets.whatsapp },
        { label: 'Discord', icon: 'discord', url: DISCORD_URL },
        { label: 'Copiar link', icon: 'link', action: 'copy' }
      ];

      const icons = {
        telegram: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.8 4.7 18.5 20c-.2 1-.8 1.2-1.7.8l-5-3.7-2.4 2.3c-.3.3-.5.5-1 .5l.3-5.2 9.4-8.5c.4-.4-.1-.6-.6-.2L5.9 13.3.9 11.8c-1.1-.3-1.1-1.1.2-1.6L20.4 2.8c.9-.3 1.7.2 1.4 1.9Z"/></svg>',
        whatsapp: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 3.5A11.8 11.8 0 0 0 2.9 18l-1 4 4.1-1a11.8 11.8 0 0 0 14.5-17.5ZM12 20a8 8 0 0 1-4.1-1.1l-.3-.2-2.4.6.6-2.3-.2-.4A8 8 0 1 1 12 20Zm4.5-5.9c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.6.1-.2.3-.6.8-.8 1-.1.2-.3.2-.5.1a6.6 6.6 0 0 1-3.3-2.9c-.1-.2 0-.4.1-.5l.4-.5c.1-.1.2-.3.3-.4.1-.2 0-.3 0-.5l-.7-1.6c-.2-.4-.4-.3-.6-.3h-.5c-.2 0-.5.1-.7.3-.2.3-.9.9-.9 2.1 0 1.2.9 2.4 1 2.5.1.2 1.8 2.8 4.4 3.9 1.6.7 2.2.8 3 .7.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1-.1-.2-.3-.3-.5-.4Z"/></svg>',
        discord: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.7 5.2A16.4 16.4 0 0 0 15.6 4l-.2.4-.5 1a15.2 15.2 0 0 0-4.6 0 8 8 0 0 0-.7-1.4 16.3 16.3 0 0 0-4.1 1.2C2.9 9.1 2.2 13 2.5 16.9a16.7 16.7 0 0 0 5 2.5l1.1-1.8a10 10 0 0 1-1.8-.8l.4-.3a11.7 11.7 0 0 0 9.9 0l.4.3a10 10 0 0 1-1.8.8l1.1 1.8a16.6 16.6 0 0 0 5-2.5c.4-4.5-.7-8.3-2.1-11.7ZM9.1 14.5c-1 0-1.8-.9-1.8-2s.8-2 1.8-2c1 0 1.9.9 1.8 2 0 1.1-.8 2-1.8 2Zm5.8 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2c1 0 1.8.9 1.8 2s-.8 2-1.8 2Z"/></svg>',
        spark: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2 1.9 6.1L20 10l-6.1 1.9L12 18l-1.9-6.1L4 10l6.1-1.9L12 2Zm6 11 1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3Z"/></svg>',
        link: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.6 13.4a1 1 0 0 1 0-1.4l4.2-4.2a3 3 0 1 1 4.2 4.2l-2 2a1 1 0 1 0 1.4 1.4l2-2a5 5 0 1 0-7.1-7.1l-4.1 4.2a1 1 0 0 0 1.4 1.4Zm2.8-2.8a1 1 0 0 1 0 1.4l-4.2 4.2A3 3 0 0 1 5 12l2-2a1 1 0 1 0-1.4-1.4l-2 2a5 5 0 0 0 7.1 7.1l4.1-4.2a1 1 0 0 0-1.4-1.4Z"/></svg>',
        arrow: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.2 5.3a1 1 0 0 1 1.4 0l5.4 5.4a1 1 0 0 1 0 1.4l-5.4 5.4a1 1 0 1 1-1.4-1.4l3.7-3.7H5a1 1 0 1 1 0-2h11.9l-3.7-3.7a1 1 0 0 1 0-1.4Z"/></svg>'
      };

      function setProfile() {
        document.getElementById('profile-name').textContent = profile.name;
        document.getElementById('profile-bio').textContent = profile.bio;
      }

      function renderSocialLinks() {
        const container = document.getElementById('social-row');
        container.innerHTML = '';

        for (const item of socialLinks) {
          const link = document.createElement('a');
          link.className = 'social-link';
          link.href = item.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.setAttribute('aria-label', item.label);
          link.title = item.label;
          link.innerHTML = icons[item.icon] || item.label.slice(0, 1);
          container.appendChild(link);
        }
      }

      function renderMainLinks() {
        const container = document.getElementById('links-list');
        container.innerHTML = '';

        for (const item of mainLinks) {
          const control = item.disabled ? document.createElement('button') : document.createElement('a');
          control.className = `link-button tone-${item.tone || 'pink'}`;

          if (item.disabled) {
            control.type = 'button';
            control.disabled = true;
          } else {
            control.href = item.url;
            control.target = '_blank';
            control.rel = 'noopener noreferrer';
          }

          const thumb = document.createElement('span');
          thumb.className = 'link-thumb';
          thumb.innerHTML = icons[item.thumb] || icons.spark;

          const copy = document.createElement('span');
          copy.className = 'link-copy';

          const title = document.createElement('span');
          title.className = 'link-title';
          title.textContent = item.title;

          const subtitle = document.createElement('span');
          subtitle.className = 'link-subtitle';
          subtitle.textContent = item.subtitle;

          const arrow = document.createElement('span');
          arrow.className = 'link-arrow';
          arrow.innerHTML = item.disabled ? '...' : icons.arrow;

          copy.append(title, subtitle);
          control.append(thumb, copy, arrow);
          container.appendChild(control);
        }
      }

      function renderShareMenu() {
        const menu = document.getElementById('share-menu');
        menu.innerHTML = '';

        for (const item of shareOptions) {
          const control = item.action === 'copy' ? document.createElement('button') : document.createElement('a');
          control.className = 'share-option';

          if (item.action === 'copy') {
            control.type = 'button';
            control.addEventListener('click', () => {
              copyShareUrl();
              closeShareMenu();
            });
          } else {
            control.href = item.url;
            control.target = '_blank';
            control.rel = 'noopener noreferrer';
          }

          control.innerHTML = `${icons[item.icon] || ''}<span>${item.label}</span>`;
          menu.appendChild(control);
        }
      }

      async function shareProfile() {
        if (navigator.share) {
          try {
            await navigator.share({ title: profile.name, text: profile.bio, url: SHARE_URL });
            return;
          } catch (error) {
            if (error?.name === 'AbortError') return;
          }
        }

        toggleShareMenu();
      }

      async function copyShareUrl() {
        try {
          await navigator.clipboard.writeText(SHARE_URL);
          showToast('Link copiado');
        } catch {
          showToast(SHARE_URL);
        }
      }

      function toggleShareMenu() {
        const menu = document.getElementById('share-menu');
        const isOpen = !menu.hidden;
        menu.hidden = isOpen;
        document.querySelector('.share-button').setAttribute('aria-expanded', String(!isOpen));
      }

      function closeShareMenu() {
        const menu = document.getElementById('share-menu');
        menu.hidden = true;
        document.querySelector('.share-button').setAttribute('aria-expanded', 'false');
      }

      function showToast(message) {
        const toast = document.getElementById('share-toast');
        toast.textContent = message;
        toast.classList.add('is-visible');
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove('is-visible'), 2200);
      }

      function enableThemeToggle() {
        const button = document.querySelector('.theme-button');
        const storedTheme = getStoredTheme();

        if (storedTheme === 'dark') document.body.classList.add('dark');
        syncThemeButton(button);

        button.addEventListener('click', () => {
          document.body.classList.toggle('dark');
          setStoredTheme(document.body.classList.contains('dark') ? 'dark' : 'pink');
          syncThemeButton(button);
        });
      }

      function syncThemeButton(button) {
        const isDark = document.body.classList.contains('dark');
        button.querySelector('span').textContent = isDark ? '☀' : '☾';
        themeMeta?.setAttribute('content', isDark ? '#130f14' : '#f9c7d5');
      }

      function getStoredTheme() {
        try { return localStorage.getItem(THEME_STORAGE_KEY); } catch { return null; }
      }

      function setStoredTheme(value) {
        try { localStorage.setItem(THEME_STORAGE_KEY, value); } catch {}
      }

      setProfile();
      renderSocialLinks();
      renderMainLinks();
      renderShareMenu();
      enableThemeToggle();
      document.querySelector('.share-button').addEventListener('click', shareProfile);
      document.addEventListener('click', (event) => {
        if (!event.target.closest('.share-button') && !event.target.closest('.share-menu')) closeShareMenu();
      });
    </script>
  </body>
</html>
